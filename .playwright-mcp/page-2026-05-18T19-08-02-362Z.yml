      - generic [ref=e4713]:
        - heading "Почему Nevatrip?" [level=2] [ref=e4716]
        - img "Nevatrip — Водные прогулки и экскурсии по Петербургу" [ref=e4718]
      - generic [ref=e4720]:
        - paragraph [ref=e4721]: "Петербург по-настоящему раскрывается именно с воды. Вместе с Nevatrip — официальным сервисом бронирования билетов на водные прогулки: по Неве, рекам и каналам исторического центра, а также в пригороды. И ценами выгоднее, чем на причале."
        - heading "Почему Nevatrip?" [level=2] [ref=e4722]
        - list [ref=e4723]:
          - listitem [ref=e4724]:
            - text: Мы всегда на связи. Не знаете, какой маршрут выбрать, или не можете найти нужный причал? Позвоните по телефону
            - link "+7 (812) 213-24-24" [ref=e4725] [cursor=pointer]:
              - /url: /+7 (812) 213-24-24
            - text: или напишите на
            - link "order@nevatrip.ru" [ref=e4726] [cursor=pointer]:
              - /url: mailto:order@nevatrip.ru
            - text: — наши менеджеры с удовольствием помогут разобраться.
          - listitem [ref=e4727]: Покупка за пару кликов. Выберите маршрут, нажмите «Выбрать дату», оплатите онлайн — и готово, билет уже на вашей почте. Показывать можно прямо с телефона, распечатывать необязательно.
          - listitem [ref=e4728]: "Гибкое время отправления. На многие дневные маршруты не нужен билет с фиксированным временем: выбираете дату, а садитесь на то судно, которое удобнее по расписанию."
          - listitem [ref=e4729]: Скидки и акции. Мы регулярно публикуем промокоды и специальные предложения, чтобы кататься было еще приятнее.
          - listitem [ref=e4730]: Все в одном месте. Дневные прогулки по каналам, ночное разведение мостов, метеоры в пригороды, аренда катера или яхты — самый большой выбор водного досуга в Петербурге.
          - listitem [ref=e4731]: Круглый год. С апреля по октябрь ходят теплоходы, а зимой мы отправляемся кататься по льду или на автобусные прогулки.
        - heading "Популярные маршруты" [level=2] [ref=e4732]
        - heading "По Неве и каналам" [level=3] [ref=e4733]
        - paragraph [ref=e4734]: Классический круиз по центру Петербурга с аудиогидом — самый любимый маршрут наших пассажиров. Уютное однопалубное судно неспешно проходит по Фонтанке и Мойке, и архитектура городских набережных открывается совсем иначе, чем с берега. Хотите живого общения — берите тур с гидом, предпочитаете уединение — есть индивидуальный круиз на катере в своей компании.
        - heading "Ночные маршруты и развод мостов" [level=3] [ref=e4735]
        - paragraph [ref=e4736]: "Разведение мостов — главное зрелище белых ночей, которое стоит увидеть хотя бы раз. Мы предлагаем несколько форматов на любой вкус: ночная водная прогулка под развод четырех мостов с гидом или аудиогидом, романтический круиз на катере, комбо-тур с ночным автобусом, а еще — прогулка по ночной Петропавловской крепости с последующим выходом на теплоход прямо из сердца города. Для особого вечера есть теплоходы-рестораны с живой музыкой и открытой палубой — такое не забывается."
        - heading "Дневные маршруты и метеоры" [level=3] [ref=e4737]
        - paragraph [ref=e4738]: Хочется выбраться за город? Метеоры домчат вас из центра Санкт-Петербурга до Петергофа за 35 минут, до Кронштадта — за полтора часа вдоль живописной панорамы города и старинных фортов. Также есть поездки в Стрельну с экскурсией по Константиновскому дворцу и в крепость Орешек на Ладожском озере — для тех, кто хочет узнать Петербург поглубже.
        - heading "Аренда катера, яхты или теплохода" [level=3] [ref=e4739]
        - paragraph [ref=e4740]: "Планируете праздник, корпоратив или романтический вечер? Поможем выбрать и организовать: моторный катер для камерной прогулки, парусная яхта для просторов Финского залива или вместительный теплоход для настоящего праздника в петербургском стиле. Подберём маршрут, организуем фуршет и трансфер — всё под ваши пожелания."
        - paragraph [ref=e4741]: Достопримечательности города с воды
        - paragraph [ref=e4742]: С воды городских достопримечательностей открывается совершенно иначе. Спас на Крови, Казанский собор, Дом Зингера, Эрмитаж, Петропавловская крепость — архитектура центра Санкт-Петербурга предстает целиком, без суеты набережных и туристических толп. Именно ради этого зрелища сюда возвращаются снова и снова, в том числе в белые ночи, когда ночная водная прогулка превращается в нечто совсем особенное.
        - heading "Как выбрать подходящий маршрут" [level=2] [ref=e4743]
        - paragraph [ref=e4744]: "Задайте себе три вопроса: когда хотите отправиться — днем или ночью, в каком формате — с группой или только своей компанией, и сколько времени готовы провести на воде. Дневные маршруты по каналам занимают около 1–1,5 часа, ночные с разведением мостов — порядка 2 часов. Если сомневаетесь — просто напишите или позвоните, с удовольствием подберем вариант."
        - heading "Цены и условия бронирования" [level=2] [ref=e4745]
        - paragraph [ref=e4746]: Все билеты можно купить онлайн — дешевле, чем на причале. Нажмите «Выбрать дату» у любого маршрута, и система сразу покажет доступные варианты на выбранный день. После оплаты билет приходит на электронную почту — сохраните в телефоне и спокойно приходите к отправлению.
        - paragraph [ref=e4747]: "На многие дневные маршруты действует открытое время: купить билет на дату, а конкретный рейс выбрать уже на месте. Следите за нашими акциями — периодически появляются очень приятные предложения со сниженными ценами и промокодами."
        - paragraph [ref=e4748]: ООО «Центр организации и продвижения событий "Про Событие"», ИНН 7802873242, КПП 780201001, ОГРН 1147847350133. г. Санкт-Петербург, ул. Малая Морская 11.
